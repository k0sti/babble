[package]
name = "babble"
version = "0.1.0"
edition = "2021"
description = "Text-to-speech CLI using Chatterbox TTS"

[[bin]]
name = "babble"
path = "src/main.rs"

[[bin]]
name = "babble-mcp"
path = "src/bin/mcp-server.rs"

[dependencies]
reqwest = { version = "0.12", features = ["blocking", "json"] }
rodio = "0.19"
serde = { version = "1.0", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
rmcp = { version = "0.12", features = ["server", "transport-io", "macros"] }
tokio = { version = "1", features = ["full"] }
schemars = "1.1"
